# ─────────────────────────────────────────────────────────
# easyStudy — Docker Compose (方案A: 全容器化，Linux 服务器默认)
# 
# 使用方式:
#   生产/部署:  docker compose up -d              → 启动全部 7 个服务
#   开发:       注释掉 springboot/fastapi/frontend → 仅启动中间件
#              应用在原生终端启动 → 连接 localhost
# ─────────────────────────────────────────────────────────

services:
  # ═══════════════════════════════════════════════════════
  # 中间件层 (始终通过 Docker 运行)
  # ═══════════════════════════════════════════════════════

  # ── 数据库 ──
  postgres:
    image: postgres:16-alpine
    container_name: easystudy-postgres
    environment:
      POSTGRES_DB: easystudy
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d easystudy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 缓存 ──
  redis:
    image: redis:7-alpine
    container_name: easystudy-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── 向量数据库 ──
  chroma:
    image: chromadb/chroma:latest
    container_name: easystudy-chroma
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    # 注意: chromadb/chroma 镜像不含 curl/python/wget，使用 perl socket 检测端口
    healthcheck:
      test: ["CMD-SHELL", "perl -MIO::Socket::INET -e 'exit(IO::Socket::INET->new(PeerAddr=>\"localhost:8000\",Timeout=>3)?0:1)'"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: easystudy-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    profiles:
      - production
    restart: unless-stopped

  # ── 文件存储 ──
  minio:
    image: minio/minio:latest
    container_name: easystudy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════
  # 应用层
  # ═══════════════════════════════════════════════════════

  # ── Spring Boot 主后端 ──
  springboot:
    build: ./backend-spring
    container_name: easystudy-springboot
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: easystudy
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FASTAPI_URL: http://fastapi:8000
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      CORS_ALLOWED_ORIGINS: http://localhost
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ── FastAPI AI 后端 ──
  fastapi:
    build: ./backend-ai
    container_name: easystudy-fastapi
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: easystudy
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      XUNFEI_APP_ID: ${XUNFEI_APP_ID}
      XUNFEI_API_KEY: ${XUNFEI_API_KEY}
      XUNFEI_API_SECRET: ${XUNFEI_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      CHROMA_PERSIST_DIR: /app/chroma_data
      VECTOR_BACKEND: chroma-http
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    volumes:
      - ./data/chroma:/app/chroma_data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      chroma:
        condition: service_healthy
    restart: unless-stopped

  # ── React 前端 (Nginx) ──
  frontend:
    build: ./frontend
    container_name: easystudy-frontend
    ports:
      - "80:80"
    depends_on:
      springboot:
        condition: service_started
    restart: unless-stopped

# 数据持久化到 ./data/ 目录（bind mount）
