spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:easystudy}
    username: ${DB_USER:easystudy}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10

  jpa:
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:}

minio:
  access-key: ${MINIO_USER:easystudy_admin}
  secret-key: ${MINIO_PASSWORD:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
